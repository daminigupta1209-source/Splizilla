            .content-width-limit { max-width: 100%; }
        }

        const formatDate = (dateStr) => {
            if (!dateStr || dateStr === 'Today' || dateStr === 'Yesterday') return dateStr;

            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            return `${d.getDate().toString().padStart(2, '0')} ${months[d.getMonth()]} ${d.getFullYear()}`;

                const closeDrop = () => setOpenExpId(null);

                            <p style={{fontSize:'10px', fontWeight:'900', color:'var(--g)', textTransform:'uppercase', marginBottom:'10px', letterSpacing:'0.5px'}}>Quick Invite</p>
                            <div style={{display:'flex', gap:'8px'}}>
                                <button onClick={() => { navigator.clipboard.writeText(shareUrl); alert('Link Copied! 🔗'); }} style={{flex:1, background:'white', border:'1.5px solid #E2E8F0', padding:'8px', borderRadius:'12px', fontSize:'11px', fontWeight:'800', display:'flex', alignItems:'center', justifyContent:'center', gap:'6px', cursor:'pointer', transition:'0.2s all'}} onMouseEnter={e => e.currentTarget.style.borderColor = 'var(--b)'} onMouseLeave={e => e.currentTarget.style.borderColor = '#E2E8F0'}>
                                    🔗 Copy Link
                                </button>
                                <button onClick={() => window.open(`https://wa.me/?text=${encodeURIComponent((selectedId === 'STANDALONE' ? 'Check out this split on SplitZilla: ' : 'Join my SplitZilla group: ') + shareUrl)}`, '_blank')} style={{flex:1, background:'#25D366', color:'white', border:'none', padding:'8px', borderRadius:'12px', fontSize:'11px', fontWeight:'800', display:'flex', alignItems:'center', justifyContent:'center', gap:'6px', cursor:'pointer', transition:'0.2s all'}} onMouseEnter={e => e.currentTarget.style.opacity = 0.9} onMouseLeave={e => e.currentTarget.style.opacity = 1}>
                                    📱 WhatsApp
                                </button>
                            </div>
                        </div>

                        <input type="text" placeholder="🔍 Search contacts..." value={search} onChange={e => setSearch(e.target.value)} style={{marginBottom:'12px', height:'44px', borderRadius:'14px', border:'2px solid #F1F5F9', padding:'0 16px', outline:'none', fontWeight:'700', fontSize:'14px'}} />
                        
                        <div style={{marginBottom:'16px', background:'#F0F9FF', padding:'12px', borderRadius:'16px', border:'1.5px solid #E0F2FE'}}>
                            <label style={{fontSize:'9px', fontWeight:'950', color:'#0369A1', textTransform:'uppercase', marginBottom:'6px', display:'block'}}>Optional: UPI ID (for Pay Now feature)</label>
                            <input 
                                type="text" 
                                placeholder="e.g. name@okaxis" 
                                value={upiId} 
                                onChange={e => setUpiId(e.target.value)} 
                                style={{width:'100%', border:'none', background:'transparent', fontSize:'13px', fontWeight:'800', color:'#0C4A6E', outline:'none', padding:0}} 
                            />
                        </div>

                        <div className="splitter-scroll" style={{flex:1, overflowY:'auto', paddingRight:'4px', marginBottom:'16px'}}>
                              {filtered.map((name, i) => {
                                 const cleanName = name.split(' ')[0];
                                 const isSelected = selectedNames.includes(cleanName);
                                 const isAlreadyParticipating = selectedId === 'STANDALONE' ? currentSplitters.includes(cleanName) : selectedGroup?.members.includes(cleanName);
                                 return (
                                     <div key={i} onClick={() => !isAlreadyParticipating && toggleFriend(name)} style={{
                                         display:'flex', 
                                         justifyContent:'space-between', 
                                         alignItems:'center', 
                                         padding:'10px 14px', 
                                         background: isSelected ? 'rgba(16, 185, 129, 0.05)' : 'white', 
                                         borderRadius:'14px', 
                                         border: isSelected ? '1.5px solid #10B981' : '1.5px solid #F1F5F9',
                                         marginBottom:'8px',
                                         cursor: isAlreadyParticipating ? 'default' : 'pointer',
                                         opacity: isAlreadyParticipating ? 0.5 : 1,
                                         transition: '0.2s all'
                                     }}>
                                         <span style={{fontWeight:'700', fontSize:'14px'}}>{name}</span>
                                         {isAlreadyParticipating ? (
                                             <span style={{fontSize:'10px', fontWeight:'900', color:'var(--g)'}}>{selectedId === 'STANDALONE' ? 'Added' : 'Member'}</span>
                                         ) : (
                                             <div style={{width:'20px', height:'20px', borderRadius:'6px', border:'2px solid ' + (isSelected ? '#10B981' : '#E2E8F0'), background: isSelected ? '#10B981' : 'transparent', display:'flex', alignItems:'center', justifyContent:'center', color:'white', fontSize:'10px', transition:'0.2s all'}}>
                                                 {isSelected && '✓'}
                                             </div>
                                         )}
                                     </div>
                                 );
                             })}
                        </div>

                        {selectedNames.length > 0 && (
                            <button className="btn-green" onClick={handleConfirmAdd} style={{padding:'14px', borderRadius:'14px', fontSize:'14px'}}>Add {selectedNames.length} Friend{selectedNames.length > 1 ? 's' : ''} ✨</button>
                        )}
                    </div>
                </div>
            );
        };

        const Analytics = ({ expenses, groups, me }) => {
            const [analyticsDetail, setAnalyticsDetail] = useState(null);
            
            const CATEGORY_MAP = {
                '🍕': 'Food & Dining', '🍔': 'Food & Dining', '☕': 'Food & Dining',
                '🚗': 'Transport', '🚕': 'Transport', '✈️': 'Travel',
                '🏨': 'Stays & Hotels', '🏠': 'Housing & Living',
                '🎟️': 'Entertainment', '🎮': 'Entertainment', '🍿': 'Entertainment',
                '🛍️': 'Shopping', '👕': 'Shopping',
                '📝': 'Bills & Utils', '⚡': 'Bills & Utils',
                '💊': 'Health', '🏥': 'Health',
                '🎓': 'Education'
            };

            const getCatName = (emoji) => CATEGORY_MAP[emoji] || 'General / Other';

            useEffect(() => {
                const handleEsc = (e) => { if (e.key === 'Escape') setAnalyticsDetail(null); };
                window.addEventListener('keydown', handleEsc);
                return () => window.removeEventListener('keydown', handleEsc);
            }, []);

            // Group by Category Name
            const groupedData = expenses.reduce((acc, e) => {
                const emoji = getEmoji(e.title);
                const name = getCatName(emoji);
                if (!acc[name]) acc[name] = { name, emoji, amount: 0, items: [] };
                acc[name].amount += (parseFloat(e.amt) || 0);
                acc[name].items.push(e);
                return acc;
            }, {});

            const categoryList = Object.values(groupedData).sort((a, b) => b.amount - a.amount);
            const totalSpentVal = expenses.reduce((acc, e) => acc + (parseFloat(e.amt) || 0), 0);
            const avgExpense = totalSpentVal / (expenses.length || 1);
            const monthlyProjected = totalSpentVal * 1.2; // Simulated projection logic
            
            const mostActiveGroup = [ {id: 'STANDALONE', name: 'Standalone Splits ⚡'}, ...groups ].reduce((prev, current) => {
                const prevCount = expenses.filter(e => e.gId === prev.id).length;
                const currCount = expenses.filter(e => e.gId === current.id).length;
                return (currCount > prevCount) ? current : prev;
            }, {id: 'STANDALONE', name: 'Standalone Splits ⚡'});

            const SpendingTrend = () => {
                const points = expenses.length > 0 ? expenses.slice(-10).map((e, i) => `${i * 45},${120 - (parseFloat(e.amt) / 500)}`) : "0,120 400,120";
                return (
                    <div className="card shadow-sm" style={{padding:'32px', marginBottom:'32px', background:'white', border:'1.5px solid rgba(0,0,0,0.02)'}}>
                        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'32px'}}>
                            <div>
                                <h3 className="nunito" style={{fontSize:'20px', fontWeight:'900', display:'flex', alignItems:'center', gap:'12px'}}><span>🌊</span> Your Spending Flow</h3>
                                <p style={{fontSize:'10px', fontWeight:'800', color:'var(--g)', marginTop:'4px'}}>A visual look at when your biggest bills happened</p>
                            </div>
                            <div className="pill blue" style={{fontSize:'10px', padding:'6px 12px'}}>High Spikes = Bigger Bills</div>
                        </div>
                        <div style={{height:'150px', width:'100%', position:'relative', padding:'20px 0'}}>
                            <svg width="100%" height="100%" viewBox="0 0 450 150" preserveAspectRatio="none">
                                <defs>
                                    <linearGradient id="lineGrad" x1="0" y1="0" x2="0" y2="1">
                                        <stop offset="0%" stopColor="#6366F1" stopOpacity="0.2" />
                                        <stop offset="100%" stopColor="#6366F1" stopOpacity="0" />
                                    </linearGradient>
                                </defs>
                                <path d={`M 0,150 L ${points} L 450,150 Z`} fill="url(#lineGrad)" />
                                <polyline points={points} fill="none" stroke="#6366F1" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round" style={{filter: 'drop-shadow(0 4px 6px rgba(99, 102, 241, 0.3))'}} />
                            </svg>
                        </div>
                        <div style={{display:'flex', justifyContent:'space-between', marginTop:'12px', padding:'0 8px'}}>
                            <span style={{fontSize:'10px', fontWeight:'900', color:'var(--g)'}}>EARLIER BILLS</span>
                            <span style={{fontSize:'10px', fontWeight:'900', color:'#6366F1'}}>LATEST SPENDING ⚡</span>
                        </div>
                    </div>
                );
            };

            const MiniMetric = ({ label, value, icon, color, sub, onClick }) => (
                <div className="card shadow-sm hover-up" onClick={onClick} style={{padding:'20px', display:'flex', alignItems:'center', gap:'16px', background:'white', border:`1.5px solid ${color}22`, cursor:'pointer'}}>
                    <div style={{width:'50px', height:'50px', borderRadius:'14px', background:`${color}11`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:'24px'}}>{icon}</div>
                    <div>
                        <p style={{fontSize:'10px', fontWeight:'900', color:'var(--g)', textTransform:'uppercase', letterSpacing:'0.5px'}}>{label}</p>
                        <h4 className="nunito" style={{fontSize:'18px', fontWeight:'900', color:'#1F2937'}}>{value}</h4>
                        <p style={{fontSize:'8px', fontWeight:'800', color:'var(--g)', marginTop:'2px'}}>{sub}</p>
                    </div>
                </div>
            );

            return (
                <div className="content-width-limit" style={{paddingBottom:'80px'}}>
                    {analyticsDetail && (
                        <div className="modal-overlay" style={{display:'flex', alignItems:'center', justifyContent:'center'}} onClick={() => setAnalyticsDetail(null)}>
                            <div className="card shadow-xl" style={{width:'450px', padding:'32px', position:'relative', animation:'slideUp 0.3s ease-out'}} onClick={e => e.stopPropagation()}>
                                <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'24px'}}>
                                    <h3 className="nunito" style={{fontSize:'20px', fontWeight:'900'}}>{analyticsDetail.title}</h3>
                                    <button onClick={() => setAnalyticsDetail(null)} style={{background:'none', border:'none', fontSize:'24px', cursor:'pointer', opacity:0.5}}>×</button>
                                </div>
                                <div style={{maxHeight:'400px', overflowY:'auto', display:'flex', flexDirection:'column', gap:'12px'}}>
                                    {analyticsDetail.items.map((item, i) => (
                                        <div key={i} style={{padding:'16px', background:'#F8FAFC', borderRadius:'16px', border:'1.5px solid #F1F5F9', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                                            <div style={{display:'flex', alignItems:'center', gap:'12px'}}>
                                                <span style={{fontSize:'18px'}}>{item.icon}</span>
                                                <div>
                                                    <span style={{fontWeight:'800', fontSize:'14px', display:'block'}}>{item.text}</span>
                                                    {item.sub && <span style={{fontSize:'10px', color:'var(--g)', fontWeight:'700'}}>{item.sub}</span>}
                                                </div>
                                            </div>
                                            {item.val && <span style={{fontWeight:'900', color:'#1F2937'}}>{item.val}</span>}
                                        </div>
                                    ))}
                                    {analyticsDetail.items.length === 0 && <p style={{textAlign:'center', color:'var(--g)', padding:'20px'}}>No records found</p>}
                                </div>
                            </div>
                        </div>
                    )}
                    <div className="hero" style={{
                        background:'linear-gradient(135deg, #ECFDF5 0%, #F0FDF4 100%)', 
                        padding:'40px 20px', 
                        borderRadius:'32px', 
                        textAlign:'center', 
                        color:'#065F46', 
                        marginBottom:'32px',
                        boxShadow:'0 15px 30px -10px rgba(0, 0, 0, 0.03)',
                        border:'1px solid rgba(255,255,255,0.8)'
                    }}>
                        <h1 className="nunito" style={{fontSize:'32px'}}>Analytics Studio 📊</h1>
                        <p style={{fontSize:'12px', fontWeight:'800', opacity:0.7, marginTop:'8px'}}>Deep insights across all your {groups.length} active groups</p>
                    </div>

                    <div style={{display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:'20px', marginBottom:'32px'}}>
                        <MiniMetric 
                            label="Total Money Gone" value={`₹${totalSpentVal.toLocaleString()}`} icon="💸" color="#10B981" sub="Sum of all bills added"
                            onClick={() => setAnalyticsDetail({ title: 'Total Spent Log 💸', items: expenses.map(e => ({ text: e.title, icon: getEmoji(e.title), val: `₹${e.amt}`, sub: groups.find(g => g.id === e.gId)?.name })) })}
                        />
                        <MiniMetric 
                            label="Month-End Guess" value={`₹${monthlyProjected.toLocaleString()}`} icon="🔥" color="#EF4444" sub="What you'll likely hit"
                            onClick={() => setAnalyticsDetail({ title: 'Month-End Guess 🔥', items: [{ text: 'Current Rate', icon: '📈', val: `₹${totalSpentVal.toLocaleString()}` }, { text: 'Projected End', icon: '📅', val: `₹${monthlyProjected.toLocaleString()}` }, { text: 'Logic', icon: '🎯', val: 'Based on your weekly speed' }] })}
                        />
                        <MiniMetric 
                            label="Average Bill" value={`₹${avgExpense.toFixed(0)}`} icon="⚖️" color="#6366F1" sub="Typical cost per bill"
                            onClick={() => setAnalyticsDetail({ title: 'Bill Stats ⚖️', items: [{ text: 'Total Count', icon: '🔢', val: expenses.length }, { text: 'Typical Bill', icon: '📅', val: `₹${avgExpense.toFixed(0)}` }] })}
                        />
                        <MiniMetric 
                            label="Busiest Group" value={mostActiveGroup.name} icon="⚡" color="#F59E0B" sub="Where you spend most"
                            onClick={() => {
                                const gExps = expenses.filter(e => e.gId === mostActiveGroup.id);
                                setAnalyticsDetail({ title: `Busiest Group: ${mostActiveGroup.name} ⚡`, items: gExps.map(e => ({ text: e.title, icon: getEmoji(e.title), val: `₹${e.amt}` })) });
                            }}
                        />
                    </div>

                    <SpendingTrend />

                    <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'48px', alignItems:'start'}}>
                        <div className="card shadow-sm" style={{padding:'32px', border:'1.5px solid rgba(0,0,0,0.02)'}}>
                            <h3 className="nunito" style={{fontSize:'20px', fontWeight:'900', marginBottom:'32px', display:'flex', alignItems:'center', gap:'12px'}}><span>🔥</span> Top Categories</h3>
                            {categoryList.length === 0 ? <p style={{textAlign:'center', color:'var(--g)', padding:'40px'}}>No data harvested yet</p> : categoryList.map(cat => {
                                const pct = (cat.amount / (totalSpentVal || 1) * 100) || 0;
                                return (
                                    <div key={cat.name} className="hover-up" onClick={() => setAnalyticsDetail({ title: `${cat.name} Expenses`, items: cat.items.map(e => ({ text: e.title, icon: getEmoji(e.title), val: `₹${e.amt}`, sub: groups.find(g => g.id === e.gId)?.name })) })} style={{marginBottom:'24px', cursor:'pointer', padding:'8px', borderRadius:'12px'}}>
                                        <div style={{display:'flex', justifyContent:'space-between', fontWeight:'900', fontSize:'14px', marginBottom:'12px'}}>
                                            <span style={{display:'flex', alignItems:'center', gap:'10px'}}>
                                                <span style={{fontSize:'20px'}}>{cat.emoji}</span>
                                                <span style={{color:'#475569'}}>{cat.name}</span>
                                            </span>
                                            <span style={{color:'#1F2937'}}>₹{cat.amount.toLocaleString()}</span>
                                        </div>
                                        <div style={{width:'100%', height:'10px', background:'#F1F5F9', borderRadius:'20px', overflow:'hidden', position:'relative'}}>
                                            <div style={{width:`${pct}%`, height:'100%', background:'linear-gradient(90deg, #6366F1 0%, #A855F7 100%)', borderRadius:'20px', transition:'1s width cubic-bezier(0.4, 0, 0.2, 1)'}}></div>
                                        </div>
                                        <div style={{display:'flex', justifyContent:'flex-end', marginTop:'8px'}}>
                                            <span className="pill" style={{fontSize:'10px', padding:'4px 10px', background:'white', border:'1px solid #E2E8F0', color:'#64748B'}}>{pct.toFixed(0)}% of total</span>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>

                        <div className="card shadow-sm" style={{padding:'32px', border:'1.5px solid rgba(0,0,0,0.02)'}}>
                            <h3 className="nunito" style={{fontSize:'20px', fontWeight:'900', marginBottom:'32px', display:'flex', alignItems:'center', gap:'12px'}}><span>🏙️</span> Group Health List</h3>
                            <div style={{display:'flex', flexDirection:'column', gap:'16px'}}>
                                {groups.map(g => {
                                    const gExps = expenses.filter(e => e.gId === g.id);
                                    const count = gExps.length;
                                    const gTotal = gExps.reduce((acc, e) => acc + (parseFloat(e.amt) || 0), 0);
                                    return (
                                        <div key={g.id} className="hover-up" onClick={() => setAnalyticsDetail({ title: `${g.name} Health Stats`, items: [{ text: 'Total Spent', icon: '💸', val: `₹${gTotal.toLocaleString()}` }, { text: 'Event Count', icon: '📈', val: count }, { text: 'Member Count', icon: '👤', val: g.members.length }] })} style={{display:'flex', justifyContent:'space-between', alignItems:'center', padding:'24px', background:'#F8FAFC', borderRadius:'24px', border:'1.5px solid #F1F5F9', transition:'0.3s all', cursor:'pointer'}}>
                                            <div style={{display:'flex', alignItems:'center', gap:'20px'}}>
                                                <div style={{fontSize:'32px', width:'64px', height:'64px', background:'white', borderRadius:'18px', display:'flex', alignItems:'center', justifyContent:'center', boxShadow:'0 4px 6px -1px rgba(0,0,0,0.05)'}}>{getEmoji(g.name)}</div>
                                                <div>
                                                    <span style={{fontWeight:'900', fontSize:'18px', color:'#1F2937', display:'block'}}>{g.name}</span>
                                                    <span style={{fontSize:'11px', color:'var(--g)', fontWeight:'800'}}>{g.members.length} Members active</span>
                                                </div>
                                            </div>
                                            <div style={{textAlign:'right'}}>
                                                <div className="pill blue" style={{padding:'8px 20px', fontSize:'12px', fontWeight:'900'}}>{count} Events</div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const PaymentHistory = ({ expenses, groups, me }) => {
            const settlements = expenses.filter(e => e.title.includes('🤝 Settlement')).sort((a,b) => b.id - a.id);
            
            return (
                <div className="content-width-limit" style={{paddingBottom:'80px'}}>
                    <div className="hero" style={{
                        background:'linear-gradient(135deg, #FEF3C7 0%, #FFFBEB 100%)', 
                        padding:'40px 20px', 
                        borderRadius:'32px', 
                        textAlign:'center', 
                        color:'#92400E', 
                        marginBottom:'32px',
                        boxShadow:'0 15px 30px -10px rgba(0, 0, 0, 0.03)',
                        border:'1px solid rgba(255,255,255,0.8)'
                    }}>
                        <h1 className="nunito" style={{fontSize:'32px'}}>Payment History 📜</h1>
                        <p style={{fontSize:'12px', fontWeight:'800', opacity:0.7, marginTop:'8px'}}>Your complete chronological ledger of cleared dues</p>
                    </div>

                    <div style={{display:'flex', flexDirection:'column', gap:'16px'}}>
                        {settlements.length === 0 ? (
                            <div className="card" style={{padding:'60px', textAlign:'center', color:'var(--g)', fontWeight:'700'}}>No payments recorded yet 🕊️</div>
                        ) : settlements.map(s => {
                            const g = groups.find(x => x.id === s.gId);
                            const isByMe = s.paid === me;
                            return (
                                <div key={s.id} className="card hover-up" style={{padding:'24px', display:'flex', justifyContent:'space-between', alignItems:'center', border:'1.5px solid #F1F5F9', background:'white'}}>
                                    <div style={{display:'flex', alignItems:'center', gap:'20px'}}>
                                        <div style={{width:'56px', height:'56px', background: isByMe ? '#ECFDF5' : '#EFF6FF', borderRadius:'18px', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'28px'}}>
                                            {isByMe ? '📤' : '📥'}
                                        </div>
                                        <div>
                                            <div style={{display:'flex', alignItems:'center', gap:'10px'}}>
                                                <h3 className="nunito" style={{fontSize:'18px', color:'#1E293B'}}>{isByMe ? 'You Paid' : `${s.paid} Paid You`}</h3>
                                                <span className="pill" style={{fontSize:'9px', padding:'4px 8px', background:'#F8FAFC', color:'var(--g)'}}>{g?.name || 'Group'}</span>
                                            </div>
                                            <p style={{fontSize:'11px', fontWeight:'800', color:'var(--g)', marginTop:'4px'}}>
                                                {isByMe ? `To: ${s.splitters?.[0]}` : `From: ${s.paid}`} • {s.date}
                                            </p>
                                        </div>
                                    </div>
                                    <div style={{textAlign:'right'}}>
                                        <div style={{fontSize:'22px', fontWeight:'900', color:'#0F172A'}}>{s.currency || '₹'}{s.amt.toLocaleString()}</div>
                                        <div className="pill" style={{marginTop:'4px', background: isByMe ? '#D1FAE5' : '#DBEAFE', color: isByMe ? '#065F46' : '#1E40AF', fontSize:'10px', fontWeight:'900'}}>Cleared ✅</div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        const FriendsView = ({ groups, expenses, me, setView, setSelectedId, setGlobalSettleData, BalanceDisplay }) => {
            const masterBal = {};
            // Calculate balances from ALL expenses (Grouped + Standalone)
            expenses.forEach(e => {
                const splitters = e.splitters || [];
                const amount = parseFloat(e.amt) || 0;
                const payer = e.paid;
                
                splitters.forEach(m => {
                    if (m === me) return; // Don't track self
                    if (!masterBal[m]) masterBal[m] = {};
                    const curr = e.currency || '₹';
                    
                    const myShare = (!e.mode || e.mode === 'Equally') ? (amount / splitters.length) : (e.mode === 'Unequally' ? (parseFloat(e.shares?.[me]) || 0) : (amount * (parseFloat(e.shares?.[me]) || 0) / 100));
                    const otherShare = (!e.mode || e.mode === 'Equally') ? (amount / splitters.length) : (e.mode === 'Unequally' ? (parseFloat(e.shares?.[m]) || 0) : (amount * (parseFloat(e.shares?.[m]) || 0) / 100));
                    
                    if (payer === me) masterBal[m][curr] = (masterBal[m][curr] || 0) + otherShare;
                    if (payer === m) masterBal[m][curr] = (masterBal[m][curr] || 0) - myShare;
                });
            });

            const friends = Object.entries(masterBal).map(([name, bals]) => ({ name, bals }));

            return (
                <div className="content-width-limit">
                    <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'32px'}}>
                        <h2 className="nunito" style={{fontSize:'32px', fontWeight:'900', display:'flex', alignItems:'center', gap:'12px'}}><span>👥</span> Your Circle</h2>
                        <div style={{background:'white', padding:'8px 20px', borderRadius:'100px', border:'2px solid #F1F5F9', fontSize:'14px', fontWeight:'800', color:'var(--g)'}}>{friends.length} Friends Globally</div>
                    </div>

                    <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(340px, 1fr))', gap:'20px'}}>
                        {friends.map(f => {
                            const isOwed = Object.values(f.bals).some(v => v > 0.01);
                            const isOwe = Object.values(f.bals).some(v => v < -0.01);
                            
                            return (

        const CurrencyConverterModal = ({ setShowConvertModalId, group, setGroups, groups, expenses, setExpenses, me }) => {
            const [targetCurr, setTargetCurr] = useState(group.currency === '₹' ? '$' : '₹');
            const [rate, setRate] = useState(group.currency === '₹' ? '0.0106' : '94.44');
            const [isConverting, setIsConverting] = useState(false);
            const [isFetching, setIsFetching] = useState(false);

            const fetchLiveRate = async (base, target) => {
                setIsFetching(true);
                try {
                    const res = await fetch(`https://open.er-api.com/v6/latest/${base === '₹' ? 'INR' : base === '$' ? 'USD' : base === '€' ? 'EUR' : 'GBP'}`);
                    const data = await res.json();
                    const targetCode = target === '₹' ? 'INR' : target === '$' ? 'USD' : target === '€' ? 'EUR' : 'GBP';
                    if (data.rates && data.rates[targetCode]) {
                        setRate(data.rates[targetCode].toFixed(4));
                    }
                } catch (e) {
                    console.error("Rate fetch failed", e);
                } finally {
                    setIsFetching(false);
                }
            };

            const handleConvert = () => {
                setIsConverting(true);
                setTimeout(() => {
                    const r = parseFloat(rate) || 1;
                    // Update Group Currency
                    setGroups(groups.map(g => g.id === group.id ? {...g, currency: targetCurr} : g));
                    
                    // Update Group Expenses
                    setExpenses(prev => {
                        const updated = prev.map(e => {
                            if (String(e.gId) === String(group.id)) {
                                if (e.isConversion) return e; // Skip conversion logs
                                
                                const newShares = {};
                                if (e.mode === 'Unequally' && e.shares) {
                                    Object.entries(e.shares).forEach(([m, s]) => {
                                        newShares[m] = s * r;
                                    });
                                }
                                
                                return {
                                    ...e,
                                    amt: e.amt * r,
                                    currency: targetCurr,
                                    shares: Object.keys(newShares).length > 0 ? newShares : e.shares
                                };
                            }
                            return e;
                        });
                        return [{
                            id: Date.now(),
                            gId: group.id,
                            title: `Converted Space to ${targetCurr} ✨`,
                            amt: 0,
                            rate: r,
                            fromCurr: group.currency,
                            toCurr: targetCurr,
                            date: new Date().toISOString().split('T')[0],
                            paid: me,
                            isConversion: true,
                            category: '💱'
                        }, ...updated];
                    });
                    
                    setIsConverting(false);
                    setShowConvertModalId(null);
                    alert(`Success! Ledger converted to ${targetCurr} at rate ${rate} 🎊`);
                }, 1500);
            };

            return (
                <div className="modal-overlay" onClick={() => setShowConvertModalId(null)} style={{zIndex: 3000, display:'flex', alignItems:'center', justifyContent:'center'}}>
                    <div className="card shadow-xl" style={{width:'420px', padding:'32px', position:'relative', textAlign:'center', animation:'slideUp 0.3s ease-out'}} onClick={e => e.stopPropagation()}>
                        <div onClick={() => setShowConvertModalId(null)} style={{position:'absolute', top:'16px', right:'16px', cursor:'pointer', fontSize:'20px', opacity:0.3}}>✕</div>
                        <div style={{width:'64px', height:'64px', background:'#F5F3FF', borderRadius:'20px', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'32px', margin:'0 auto 20px', border:'2.5px solid #DDD6FE'}}>💱</div>
                        <h3 className="nunito" style={{fontSize:'22px', fontWeight:'900', marginBottom:'8px'}}>Convert Group Currency</h3>
                        <p style={{fontSize:'12px', fontWeight:'700', color:'var(--g)', opacity:0.7, marginBottom:'28px'}}>Switch all ledger balances to a new currency using real-time forex rates.</p>
                        
                        <div style={{display:'flex', flexDirection:'column', gap:'16px', marginBottom:'32px'}}>
                            <div style={{textAlign:'left'}}>
                                <label style={{fontSize:'10px', fontWeight:'950', color:'var(--g)', textTransform:'uppercase', letterSpacing:'1px'}}>Target Currency</label>
                                <select value={targetCurr} onChange={e => {
                                    const val = e.target.value;
                                    setTargetCurr(val);
                                    if (group.currency === '₹' && val === '$') setRate('0.0106');
                                    else if (group.currency === '$' && val === '₹') setRate('94.44');
                                    else if (group.currency === '₹' && val === '€') setRate('0.0090');
                                    else if (group.currency === '€' && val === '₹') setRate('111.30');
                                    else setRate('1.00'); 
                                }} style={{width:'100%', padding:'16px', borderRadius:'16px', border:'2px solid #F1F5F9', background:'#F8FAFC', fontSize:'16px', fontWeight:'900', color:'var(--t)', marginTop:'6px', outline:'none', cursor:'pointer'}}>
                                    <option value="₹">INR - Indian Rupee (₹)</option>
                                    <option value="$">USD - US Dollar ($)</option>
                                    <option value="€">EUR - Euro (€)</option>
                                    <option value="£">GBP - British Pound (£)</option>
                                    <option value="¥">JPY - Japanese Yen (¥)</option>
                                    <option value="AED">AED - Dirham (د.إ)</option>

                            <div style={{background:'#F0FDF4', padding:'16px', borderRadius:'16px', border:'1.5px solid #DCFCE7', textAlign:'left'}}>
                                <div style={{display:'flex', justifyContent:'space-between', marginBottom:'4px'}}>
                                    <label style={{fontSize:'10px', fontWeight:'950', color:'#166534', textTransform:'uppercase'}}>Exchange Rate (1 {group.currency} = ? {targetCurr})</label>
                                </div>
                                <div style={{position:'relative', display:'flex', alignItems:'center', justifyContent:'space-between'}}>
                                    <input 
                                        type="number" 
                                        value={rate} 
                                        onChange={e => setRate(e.target.value)}
                                        style={{flex:1, background:'transparent', border:'none', fontSize:'18px', fontWeight:'950', color:'#14532D', outline:'none', padding:0}}
                                    />
                                    <button 
                                        onClick={() => fetchLiveRate(group.currency, targetCurr)}
                                        disabled={isFetching}
                                        style={{padding:'6px 12px', background:'#166534', color:'white', border:'none', borderRadius:'8px', fontSize:'9px', fontWeight:'950', cursor:'pointer'}}
                                    >
                                        {isFetching ? '...' : '⚡ Fetch Live'}
                                    </button>
                                </div>
                                <p style={{fontSize:'10px', fontWeight:'700', color:'#15803D', marginTop:'4px'}}>💡 Live rates from Open ER API. You can also manually adjust.</p>
                            </div>
                        </div>

                        <button 
                            className="btn-green hover-up" 
                            disabled={isConverting || group.currency === targetCurr} 
                            style={{width:'100%', padding:'18px', fontSize:'16px', marginBottom:'16px', opacity: group.currency === targetCurr ? 0.5 : 1}} 
                            onClick={handleConvert}
                        >
                            {group.currency === targetCurr ? 'Select Different Currency' : isConverting ? 'Processing Conversion...' : 'Confirm Conversion 💸'}
                        </button>
                        
                        <div style={{fontSize:'10px', fontWeight:'800', color:'var(--g)', opacity:0.5, display:'flex', alignItems:'center', justifyContent:'center', gap:'6px'}}>
                            <span style={{fontSize:'14px'}}>🛡️</span> Source: Real-time Forex API (Open ER)

        };

        const App = () => {
            const [theme, setTheme] = useState('lavender');
            const [view, setView] = useState('summary');
            const [selectedId, setSelectedId] = useState(null);
            const [showCurrPickerId, setShowCurrPickerId] = useState(null);
            const [showExpModal, setShowExpModal] = useState(false);
            const [editingExpense, setEditingExpense] = useState(null);
            const [showAddFriendModal, setShowAddFriendModal] = useState(false);
            const [showMembersHealth, setShowMembersHealth] = useState(false);
            const [globalSettleData, setGlobalSettleData] = useState(null);
            const [localSettleEdits, setLocalSettleEdits] = useState([]);
            const [isGroupsExpanded, setIsGroupsExpanded] = useState(false);
            const [showConvertModalId, setShowConvertModalId] = useState(null);
            const [userMetadata, setUserMetadata] = useState(() => {
                const saved = localStorage.getItem('divido_usermetadata');
                return (saved && saved !== 'undefined') ? JSON.parse(saved) : {};
            });
            const [userName, setUserName] = useState(() => {
                const saved = localStorage.getItem('divido_username');
                return (saved && saved !== 'undefined') ? saved : 'Damini Gupta';
            });
            const me = userName.split(' ')[0];

            const [groups, setGroups] = useState(() => {
                try {
                    const saved = localStorage.getItem('divido_groups');
                    const savedName = localStorage.getItem('divido_username');
                    const dName = (savedName && savedName !== 'undefined') ? savedName : 'Damini Gupta';
                    const myFirstName = dName.split(' ')[0];
                    const parsed = (saved && saved !== 'undefined') ? JSON.parse(saved) : [
                        { id: 'goa', name: 'Goa Trip 🏖️', members: [myFirstName, 'Rohan', 'Sneha', 'Amit'], currency: '₹' },
                        { id: 'flat', name: 'Flatmates 🏠', members: [myFirstName, 'Aman', 'Sanya'], currency: '₹' },
                        { id: 'food', name: 'Foodies 🍕', members: [myFirstName, 'Ishaan', 'Meera', 'Rahul', 'Zoya'], currency: '₹' }
                    ];
                    return parsed.map(g => ({...g, currency: g.currency || '₹'}));
                } catch(e) { return []; }
            });

            const [expenses, setExpenses] = useState(() => {
                try {
                    const saved = localStorage.getItem('divido_expenses');
                    const parsed = (saved && saved !== 'undefined') ? JSON.parse(saved) : [];
                    return parsed.map(e => ({...e, amt: parseFloat(e.amt) || 0}));
                } catch(e) { return []; }
            });
            const [newlyAddedFriends, setNewlyAddedFriends] = useState([]);
            const [activeSplitters, setActiveSplitters] = useState([]);

            useEffect(() => {
                if (globalSettleData) {
                    const initial = [];
                    const allVirtualGroups = [ {id: 'STANDALONE', name: 'Standalone Splits ⚡', members: [], currency: '₹'}, ...groups ];
                    
                    allVirtualGroups.forEach(g => {
                        const isStandalone = g.id === 'STANDALONE';
                        const groupExps = expenses.filter(e => e.gId === g.id);
                        const m = globalSettleData.name;
                        const rel = {};
                        
                        const relevantExps = groupExps.filter(e => {
                            const splitters = e.splitters || (isStandalone ? Array.from(new Set(e.splitters || [])) : g.members) || [];
                            return (e.paid === me && splitters.includes(m)) || (e.paid === m && splitters.includes(me));
                        });

                        relevantExps.forEach(e => {
                            const curr = e.currency || g.currency || '₹';
                            if (!rel[curr]) rel[curr] = 0;
                            const splitters = e.splitters || (isStandalone ? Array.from(new Set(e.splitters || [])) : g.members) || [];
                            const amount = parseFloat(e.amt) || 0;
                            const myShare = (!e.mode || e.mode === 'Equally') ? (amount / splitters.length) : (e.mode === 'Unequally' ? (parseFloat(e.shares?.[me]) || 0) : (amount * (parseFloat(e.shares?.[me]) || 0) / 100));
                            const otherShare = (!e.mode || e.mode === 'Equally') ? (amount / splitters.length) : (e.mode === 'Unequally' ? (parseFloat(e.shares?.[m]) || 0) : (amount * (parseFloat(e.shares?.[m]) || 0) / 100));
                            if (e.paid === me && splitters.includes(m)) rel[curr] += otherShare;
                            if (e.paid === m && splitters.includes(me)) rel[curr] -= myShare;
                        });

                        Object.entries(rel).forEach(([curr, val]) => {
                            if(Math.abs(val) > 0.01) {
                                const lastExp = relevantExps[relevantExps.length - 1];
                                const summary = relevantExps.length > 0 
                                    ? `Last: ${lastExp.title} (${curr}${lastExp.amt})` 
                                    : 'Ongoing balance';

                                initial.push({
                                    gId: g.id,
                                    gName: g.name,
                                    curr: curr,
                                    amt: Math.abs(val),
                                    maxAmt: Math.abs(val),
                                    paidBy: val > 0 ? m : me,
                                    receivedBy: val > 0 ? me : m,
                                    selected: false,
                                    summary: `${relevantExps.length} activities • ${summary}`
                                });
                            }
                        });
                    });
                    setLocalSettleEdits(initial);
                } else {
                    setLocalSettleEdits([]);
                }
            }, [globalSettleData, groups, expenses]);

            const handleFinalGlobalSettle = () => {
                const newSettlements = localSettleEdits.filter(it => it.selected && it.amt > 0).map(it => ({
                    id: Date.now() + Math.random(),
                    gId: it.gId,
                    title: `🤝 Settlement: ${it.paidBy} paid ${it.receivedBy}`,
                    amt: parseFloat(it.amt) || 0,
                    paid: it.paidBy,
                    splitters: [it.receivedBy],
                    date: new Date().toISOString().split('T')[0],
                    notes: 'Granular Global Clearance',
                    currency: it.curr,
                    category: '🤝'
                }));
                setExpenses([...newSettlements, ...expenses]);
                setGlobalSettleData(null);
            };

            const isModalOpen = !!(showExpModal || showAddFriendModal || showMembersHealth || globalSettleData || showCurrPickerId);
            useEffect(() => {
                if (isModalOpen) document.body.style.overflow = 'hidden';
                else document.body.style.overflow = 'auto';
            }, [isModalOpen]);

            useEffect(() => { localStorage.setItem('divido_usermetadata', JSON.stringify(userMetadata)); }, [userMetadata]);

                                                    const u = prompt(`Enter UPI ID for ${globalSettleData.name}:`, 'friend@okaxis');
                                                    if(u) setUserMetadata({...userMetadata, [globalSettleData.name]: { ...userMetadata[globalSettleData.name], upiId: u }});
                                                }} style={{fontSize:'9px', fontWeight:'950', padding:'6px 12px', background:'white', border:'1.5px solid #DDD6FE', borderRadius:'10px', cursor:'pointer', color:'#6D28D9'}}>➕ Add UPI ID</button>
                                            )}
                                        </div>
                                        
                                        <div style={{display:'flex', gap:'12px'}}>
                                            {[
                                                {id:'gpay', n:'GPay', c:'#4285F4', i:'https://www.gstatic.com/images/branding/product/1x/gpay_32dp.png'},
                                                {id:'phonepe', n:'PhonePe', c:'#5F259F', i:'📱'},
                                                {id:'upi', n:'UPI', c:'#097939', i:'💳'}
                                            ].map(app => {
                                                const upi = userMetadata[globalSettleData.name]?.upiId;
                                                const total = localSettleEdits.filter(it => it.selected && it.paidBy !== me).reduce((acc, it) => acc + (parseFloat(it.amt) || 0), 0);
                                                const url = `upi://pay?pa=${upi}&pn=${globalSettleData.name}&am=${total}&cu=INR&tn=Divido Settle: ${me} to ${globalSettleData.name}`;
                                                
                                                return (
                                                    <div key={app.id} style={{flex:1, display:'flex', flexDirection:'column', gap:'6px'}}>
                                                        <button 
                                                            disabled={!upi}
                                                            onClick={() => {
                                                                if(!upi) return;
                                                                window.location.href = url;
                                                                if(confirm(`Payment app triggered! 🚀\n\nMark these items as settled in Divido as well?`)) handleFinalGlobalSettle();
                                                            }}
                                                            className="hover-up btn-pay"
                                                            style={{
                                                                width:'100%', height:'50px', background: app.c, color:'white', border:'none', borderRadius:'16px', 
                                                                display:'flex', alignItems:'center', justifyContent:'center', gap:'8px', fontWeight:'950', fontSize:'12px',
                                                                cursor: upi ? 'pointer' : 'not-allowed', opacity: upi ? 1 : 0.4, transition:'0.3s all',
                                                                boxShadow: upi ? `0 8px 15px ${app.c}44` : 'none'
                                                            }}
                                                        >
                                                            {app.id === 'gpay' ? <img src={app.i} style={{width:'18px', filter:'brightness(0) invert(1)'}} /> : <span>{app.i}</span>}
                                                            {app.n}
                                                        </button>
                                                        {app.id === 'upi' && upi && (
                                                            <button onClick={() => { navigator.clipboard.writeText(upi); alert('UPI ID Copied! 📋'); }} style={{background:'none', border:'none', fontSize:'9px', fontWeight:'900', color:'#6D28D9', cursor:'pointer', opacity:0.6}}>📋 Copy ID</button>
                                                        )}
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                )}

                                <div style={{display:'flex', gap:'12px', flexDirection:'column'}}>
                                    <div style={{display:'flex', gap:'12px'}}>
                                        <button 
                                            className="btn-green" 
                                            style={{flex:1, padding:'16px', fontSize:'14px', opacity: localSettleEdits.some(it => it.selected) ? 1 : 0.5}} 
                                            onClick={handleFinalGlobalSettle}
                                            disabled={!localSettleEdits.some(it => it.selected)}
                                        >
                                            Settle {localSettleEdits.filter(it => it.selected).length} Items 💸
                                        </button>
                                        <button className="btn-yellow" style={{padding:'0 24px', background:'#F1F5F9', color:'var(--g)', border:'none', borderRadius:'16px'}} onClick={() => setGlobalSettleData(null)}>Cancel</button>
                                    </div>
                                    <button 
                                        className="hover-up" 
                                        style={{width:'100%', background:'white', border:'2px dashed var(--b)', color:'var(--b)', padding:'12px', borderRadius:'16px', fontWeight:'800', fontSize:'12px', cursor:'pointer'}} 
                                        onClick={() => setLocalSettleEdits(localSettleEdits.map(it => ({...it, selected: true})))}
                                    >
                                        ⚡ Select All shared activity
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                    <nav className="bottom-nav">
                        <div className={`b-nav-btn ${view === 'summary' ? 'active' : ''}`} onClick={() => setView('summary')}>
                            <span className="b-nav-icon">🏠</span>
                            <span>Home</span>
                        </div>
                        <div className={`b-nav-btn ${view === 'friends' ? 'active' : ''}`} onClick={() => setView('friends')}>
                            <span className="b-nav-icon">🤝</span>
                            <span>Settle Up</span>
                        </div>
                        <div className={`b-nav-btn ${view === 'activity' ? 'active' : ''}`} onClick={() => setView('activity')}>
                            <span className="b-nav-icon">📜</span>
                            <span>Activity</span>
                        </div>
                        <div className={`b-nav-btn ${view === 'analytics' ? 'active' : ''}`} onClick={() => setView('analytics')}>
                            <span className="b-nav-icon">📊</span>
                            <span>Stats</span>
                        </div>
                        <div className={`b-nav-btn ${view === 'profile' ? 'active' : ''}`} onClick={() => setView('profile')}>
                            <span className="b-nav-icon">👤</span>
                            <span>Profile</span>
                        </div>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
